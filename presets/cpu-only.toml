description = "CPU-only fallback (no CUDA, no MPS) — conservative defaults"
# Everything scaled down. YOLO on CPU is slow no matter what, so keep batches
# reasonable and don't ask for too many parallel workers or RAM will get tight.

[extract]
workers = 4
max_preview_edge = 512

[junk_filter]
batch_size = 8         # CPU inference, keep per-call latency low
imgsz = 640
min_conf = 0.30
min_visible_frac = 0.10
min_area_frac = 0.002
edge_min_area_frac = 0.05

[classifier]
batch_size = 16
num_workers = 2
