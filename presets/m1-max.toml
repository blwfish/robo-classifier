description = "Mac Studio / MBP M1 Max on external USB 3.x SSD"
# I/O-bound on extract (USB bus is the ceiling). Small previews keep downstream
# stages on internal NVMe fast. MPS isn't as big as CUDA, so batch sizes stay
# modest.

[extract]
workers = 14           # cpu_count - 2 on M1 Max (10 P-cores + 4 E-cores)
max_preview_edge = 512 # aggressive downsample; Z9 embeds 5MB previews we don't need

[junk_filter]
batch_size = 32
imgsz = 640
min_conf = 0.30
min_visible_frac = 0.10
min_area_frac = 0.002
edge_min_area_frac = 0.05

[classifier]
batch_size = 32
num_workers = 4
