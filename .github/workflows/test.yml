name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: brew install exiftool

      - name: Install Python dependencies (locked versions)
        run: pip install -r requirements-lock.txt

      - name: Run tests
        run: pytest
